version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: auth-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  swagger-ui:
    image: swaggerapi/swagger-ui:v5.17.14
    container_name: swagger-ui
    restart: unless-stopped
    depends_on:
      - gateway
    environment:
      URL: http://gateway:8080/docs/openapi.yaml
    ports:
      - "8082:8080"
  
  auth-service:
    build:
      context: ../backend-auth-service
      dockerfile: Dockerfile
    container_name: backend-auth-service
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/auth_db
      SPRING_DATASOURCE_USERNAME: auth_user
      SPRING_DATASOURCE_PASSWORD: auth_password
      APP_JWT_SECRET: very-secret-key-change-me-in-real-project-very-secret-key
      APP_JWT_ACCESS_TOKEN_EXPIRATION_MINUTES: 15
      APP_JWT_REFRESH_TOKEN_EXPIRATION_DAYS: 7
    ports:
      - "8081:8081"

  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: go-api-gateway
    restart: unless-stopped
    depends_on:
      - auth-service
    environment:
      APP_ENV: docker
      APP_PORT: 8080
      AUTH_SERVICE_URL: http://auth-service:8081
      UPSTREAM_TIMEOUT_SECONDS: 5
      RATE_LIMIT_RPS: 10
      RATE_LIMIT_BURST: 20
    ports:
      - "8080:8080"

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    restart: unless-stopped
    depends_on:
      - gateway
      - auth-service
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:11.1.4
    container_name: grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana

volumes:
  postgres_data:
  grafana_data: