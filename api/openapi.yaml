openapi: 3.0.3
info:
  title: Go API Gateway
  version: 1.0.0
  description: >
    High-performance API Gateway written in Go with reverse proxying,
    rate limiting, metrics, and observability.

servers:
  - url: http://localhost:8080

paths:
  /health:
    get:
      summary: Health check
      description: Returns service health status.
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /metrics:
    get:
      summary: Prometheus metrics
      description: Exposes Prometheus-compatible metrics for scraping.
      responses:
        "200":
          description: Metrics output

  /api/v1/ping:
    get:
      summary: Ping endpoint
      description: Simple test endpoint exposed directly by the gateway.
      responses:
        "200":
          description: Pong response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: pong

  /api/v1/auth/register:
    post:
      summary: Register user
      description: Proxied to backend-auth-service.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  example: StrongPass123
      responses:
        "201":
          description: User registered successfully
        "409":
          description: User already exists
        "429":
          description: Rate limit exceeded
        "502":
          description: Upstream service unavailable
        "504":
          description: Upstream timeout

  /api/v1/auth/login:
    post:
      summary: Login user
      description: Proxied to backend-auth-service.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  example: StrongPass123
      responses:
        "200":
          description: Login successful
        "401":
          description: Invalid credentials
        "429":
          description: Rate limit exceeded
        "502":
          description: Upstream service unavailable
        "504":
          description: Upstream timeout

  /api/v1/users/me:
    get:
      summary: Get current user
      description: Proxied to backend-auth-service.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user returned
        "401":
          description: Unauthorized
        "429":
          description: Rate limit exceeded
        "502":
          description: Upstream service unavailable
        "504":
          description: Upstream timeout

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT